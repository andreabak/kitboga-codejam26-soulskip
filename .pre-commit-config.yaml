# Top-level global exclusion - ONLY process files in src/
exclude: ^((?!src/).)*$

repos:
  # Standard pre-commit-hooks (language-agnostic cleanup)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: ["--fix=lf"]
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-yaml
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-xml
      - id: debug-statements
      - id: detect-private-key
      - id: fix-byte-order-marker

  # Custom npm-based hooks
  - repo: local
    hooks:
      - id: check
        name: check
        language: system
        entry: npm run check
        pass_filenames: false
        
      - id: lint
        name: lint
        language: system
        entry: npm run lint
        pass_filenames: false
        
      - id: format
        name: format
        language: system
        entry: npm run format
        pass_filenames: false
        
      - id: build
        name: build
        language: system
        entry: npm run build
        pass_filenames: false
