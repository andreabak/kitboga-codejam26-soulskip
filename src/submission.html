<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>SoulSkip</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <script type="module" src="./main.ts"></script>

        <style>
            html,
            body {
                background: transparent;
                margin: 0;
                padding: 0;
                font-family: sans-serif;
            }

            #overlay-container {
                width: 960px;
                height: 540px;
            }

            .hidden {
                display: none;
            }
            @keyframes fade-in {
                0% {
                    opacity: 0;
                }
                100% {
                    opacity: 1;
                }
            }

            .game {
                width: 100%;
                height: 100%;
                position: relative;
                overflow: hidden;
            }
            .hide-mouse {
                cursor: none;
            }

            .skip-btn {
                position: absolute;
                bottom: 60px;
                right: 0;
                padding: 10px 18px;
                background: rgba(0, 0, 0, 0.6);
                border: 1px solid black;
                border-right-width: 0;
                font-size: 1.2rem;
                border-radius: 4px 0 0 4px;
                color: white;
                cursor: pointer;
            }

            .player {
                position: absolute;
                width: 48px;
                height: 48px;
                pointer-events: none;
            }
            .player.low-stamina .pointer {
                filter: contrast(0.5) sepia(1) saturate(2);
            }
            .player.hurt .pointer {
                filter: contrast(0.5) sepia(1) hue-rotate(-25deg) saturate(2);
            }
            .player:not(.attacking) > .attack-animation {
                display: none;
            }
            .player > .attack-animation {
                --attack-duration: 0.15s;
                animation: player-attack var(--attack-duration);
                position: absolute;
                left: 50%;
                right: 50%;
                transform: translate(-50%, -50%);
                border-radius: 50%;
                background-color: red;
                mix-blend-mode: screen;
            }
            @keyframes player-attack {
                0% {
                    width: 1px;
                    height: 1px;
                }
                100% {
                    width: 128px;
                    height: 128px;
                }
            }

            .hud {
                position: absolute;
                width: 100%;
                height: 100%;
                animation: fade-in 1s;
            }
            .bar {
                --bar-fill: 0;
                --bar-color: white;
                --bar-diff: 0;
                --bar-diff-color: hsla(50deg, 70%, 37.5%, 0.75);
                border: 2px solid #909274;
                border-top: none;
                border-right: none;
                background-color: hsla(0, 0%, 0%, 0.5);
                position: absolute;
                height: 8px;
                width: 64px;
            }
            .bar-fill {
                position: absolute;
                left: 0;
                width: calc(100% * var(--bar-fill));
                height: 100%;
                box-sizing: border-box;
                background-clip: border-box;
                border-right: 2px solid hsla(64deg, 10%, 80%, 0.85);
                background-color: var(--bar-color);
                background-image:
                    linear-gradient(to bottom, transparent 60%, hsla(0, 0%, 100%, 0.25) 100%),
                    linear-gradient(to left, hsla(0, 0%, 100%, 0.25) 0%, transparent 16px);
            }
            .bar-diff {
                position: absolute;
                left: calc(100% * var(--bar-fill));
                width: calc(100% * (var(--bar-diff)));
                top: 1px;
                height: calc(100% - 2px);
                background: var(--bar-diff-color);
            }
            .bar.health {
                --bar-color: #551213;
                left: 16px;
                top: 16px;
                width: 256px;
            }
            .bar.stamina {
                --bar-color: #1e4731;
                left: 16px;
                top: 30px;
                width: 128px;
            }
            .bar.stamina.low-stamina .bar-fill,
            .bar.stamina.low-stamina .bar-diff {
                --bar-color: var(--bar-diff-color);
            }
        </style>
    </head>

    <body>
        <div id="overlay-container">
            <div id="game-root" class="game hidden">
                <div class="skip-btn">Skip Ad...</div>
                <div class="player hidden">
                    <div class="attack-animation"></div>
                    <img class="pointer" src="./assets/mouse-pointer.svg" />
                </div>
                <div class="hud hidden">
                    <div class="bar health">
                        <div class="bar-diff"></div>
                        <div class="bar-fill"></div>
                    </div>
                    <div class="bar stamina">
                        <div class="bar-diff"></div>
                        <div class="bar-fill"></div>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
