<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>SoulSkip</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <script type="module" src="./main.ts"></script>

        <style>
            html,
            body {
                background: transparent;
                margin: 0;
                padding: 0;
                font-family: sans-serif;
            }

            #overlay-container {
                width: 960px;
                height: 540px;
            }

            .hidden {
                display: none !important;
            }
            @keyframes fade-in {
                0% {
                    opacity: 0;
                }
                100% {
                    opacity: 1;
                }
            }

            .game {
                width: 100%;
                height: 100%;
                position: relative;
                overflow: hidden;
                user-select: none;
            }
            .hide-mouse {
                cursor: none;
            }
            .game.hide-mouse > * {
                pointer-events: none;
                user-select: none;
            }

            .skip-btn {
                position: absolute;
                bottom: 60px;
                width: max-content;
                height: 1em;
                right: -4px;
                padding: 0.5em 1em;
                background: hsla(0, 0%, 100%, 0.85);
                border: 1px solid white;
                box-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
                font-size: 1.2rem;
                border-radius: 4px;
                color: black;
                cursor: pointer;
            }

            .player {
                position: absolute;
                width: 48px;
                height: 48px;
            }
            .player.low-stamina .pointer {
                filter: contrast(0.5) sepia(1) hue-rotate(-100deg) saturate(2);
            }
            .player.hurt .pointer {
                filter: contrast(0.5) sepia(1) hue-rotate(-30deg) saturate(4);
            }

            .skip-btn:not(.attacking) > .attack-animation,
            .player:not(.attacking) > .attack-animation {
                display: none;
            }
            .attack-animation {
                --attack-duration: 0.15s;
                --attack-radius: 100px;
                animation: player-attack var(--attack-duration);
                position: absolute;
                left: 50%;
                top: 50%;
                transform: translate(-50%, -50%);
                border-radius: 50%;
                background-color: red;
                mix-blend-mode: screen;
            }
            @keyframes player-attack {
                0% {
                    width: 1px;
                    height: 1px;
                }
                100% {
                    width: calc(var(--attack-radius) * 2);
                    height: calc(var(--attack-radius) * 2);
                }
            }

            .skip-btn:not(.defending) > .defend-animation,
            .player:not(.defending) > .defend-animation {
                display: none;
            }
            .defend-animation {
                position: absolute;
                width: 56px;
                height: 56px;
                left: 50%;
                top: 50%;
                transform: translate(-50%, -50%);
                border-radius: 50%;
                background-color: cyan;
                mix-blend-mode: screen;
                opacity: 0.5;
            }

            .hud {
                position: absolute;
                width: 100%;
                height: 100%;
                animation: fade-in 1s;
            }
            .bar {
                --bar-fill: 0;
                --bar-color: white;
                --bar-diff: 0;
                --bar-diff-color: hsla(50deg, 70%, 37.5%, 0.75);
                border: 2px solid #909274;
                border-top: none;
                border-right: none;
                background-color: hsla(0, 0%, 0%, 0.5);
                position: absolute;
                height: 8px;
                width: 64px;
                box-shadow: 0 1px 1px rgba(0, 0, 0, 0.3);
            }
            .bar-fill {
                position: absolute;
                left: 0;
                width: calc(100% * var(--bar-fill));
                height: 100%;
                box-sizing: border-box;
                background-clip: border-box;
                border-right: 2px solid hsla(64deg, 10%, 80%, 0.85);
                background-color: var(--bar-color);
                background-image:
                    linear-gradient(to bottom, transparent 60%, hsla(0, 0%, 100%, 0.25) 100%),
                    linear-gradient(to left, hsla(0, 0%, 100%, 0.25) 0%, transparent 16px);
            }
            .bar-diff {
                position: absolute;
                left: calc(100% * var(--bar-fill));
                width: calc(100% * (var(--bar-diff)));
                top: 1px;
                height: calc(100% - 2px);
                background: var(--bar-diff-color);
            }
            .bar.health {
                --bar-color: #551213;
            }
            .bar.stamina {
                --bar-color: #1e4731;
            }
            .bar.stamina.low-stamina .bar-fill,
            .bar.stamina.low-stamina .bar-diff {
                --bar-color: var(--bar-diff-color);
            }

            .player-bar.health {
                left: 16px;
                top: 16px;
                width: 256px;
            }
            .player-bar.stamina {
                left: 16px;
                top: 30px;
                width: 128px;
            }

            .boss-info {
                position: absolute;
                display: grid;
                grid-template:
                    " name   damage"
                    " health health"
                    / 1fr auto;
                bottom: 64px;
                width: 320px;
                left: 0;
                right: 0;
                color: white;
                margin: 0 auto;
                gap: 0.25em;
                font-size: 0.9em;
            }
            .boss-name {
                grid-area: name;
                font-family: serif;
                text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.7);
            }
            .enemy-bar.health {
                position: relative;
                grid-area: health;
                width: 100%;
            }

            .defeat-screen,
            .victory-screen {
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                margin: auto;
                width: 100%;
                height: 2em;
                display: flex;
                align-items: center;
                justify-content: center;
                font-family: serif;
                font-size: 48px;
                text-transform: uppercase;
                text-align: center;
                background-image: linear-gradient(
                    to bottom,
                    transparent 0%,
                    rgba(0, 0, 0, 0.75) 25%,
                    rgba(0, 0, 0, 0.75) 75%,
                    transparent 100%
                );
                animation: fade-in 2s;
            }
            .defeat-screen {
                color: #680612;
            }
            .victory-screen {
                color: #f2c338;
            }
            .victory-screen::before,
            .victory-screen::after {
                content: attr(title);
                display: block;
                position: absolute;
            }
            .victory-screen::before {
                opacity: 0.25;
                animation: 2s cubic-bezier(0, 0, 0.1, 1) 0.5s both letters-spread;
                letter-spacing: 4%;
            }
            @keyframes letters-spread {
                0% {
                    letter-spacing: normal;
                }
            }
        </style>
    </head>

    <body>
        <div id="overlay-container">
            <div id="game-root" class="game hidden">
                <div class="skip-btn">
                    <div class="attack-animation"></div>
                    Skip Ad...
                </div>
                <div class="player hidden">
                    <div class="attack-animation"></div>
                    <img class="pointer" src="./assets/mouse-pointer.svg" />
                    <div class="defend-animation"></div>
                </div>
                <div class="hud hidden">
                    <div class="player-bar bar health">
                        <div class="bar-diff"></div>
                        <div class="bar-fill"></div>
                    </div>
                    <div class="player-bar bar stamina">
                        <div class="bar-diff"></div>
                        <div class="bar-fill"></div>
                    </div>
                    <div class="boss-info">
                        <div class="boss-name">Skipgard, Keeper of Discontinuity</div>
                        <div class="enemy-bar bar health">
                            <div class="bar-diff"></div>
                            <div class="bar-fill"></div>
                        </div>
                    </div>
                </div>
                <div class="defeat-screen hidden">You Died</div>
                <div class="victory-screen hidden" title="Great Enemy Felled"></div>
                <audio class="sound battle-start" src="./assets/sound-boss_music.opus" preload></audio>
                <audio class="sound defeat" src="./assets/sound-defeat.opus" preload></audio>
                <audio class="sound victory" src="./assets/sound-victory.opus" preload></audio>
                <audio class="sound parry" src="./assets/sound-parry.opus" preload></audio>
                <audio class="sound cure" src="./assets/sound-cure.opus" preload></audio>
            </div>
        </div>
    </body>
</html>
