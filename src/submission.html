<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>SoulSkip</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <script type="module" src="./main.ts"></script>

        <style>
            html,
            body {
                background: transparent;
                margin: 0;
                padding: 0;
                font-family: sans-serif;
            }

            #overlay-container {
                width: 960px;
                height: 540px;
            }
        </style>
        <link rel="stylesheet" href="./styles.css" />
    </head>

    <body>
        <div id="overlay-container">
            <div id="game-root" class="game hidden">
                <div class="enemy">
                    <div class="skip-btn">
                        <img src="./assets/enemy/skip-btn.svg" draggable="false" />
                        <div class="vines"></div>
                        <div class="eye hidden" style="left: calc(50% - 20px); transform: translate(-50%, -50%)"></div>
                        <div
                            class="eye hidden"
                            style="left: calc(50% + 20px); transform: translate(-50%, -50%) scaleX(-1)"
                        ></div>
                    </div>
                    <img class="weapon hidden" src="./assets/enemy/weapon.svg" />
                    <img class="shield" src="./assets/enemy/shield/erana-iasana-assets-fxes-gunfire-flame.webp" />
                    <div class="attack-indicator hidden"></div>
                </div>
                <div class="player hidden">
                    <img class="pointer" src="./assets/player/mouse-pointer.svg" />
                    <img class="shield hidden" src="./assets/shield.webp" />
                    <div class="attack-indicator hidden"></div>
                    <div class="defend-indicator hidden"></div>
                </div>
                <div class="animations"></div>
                <div class="hud hidden">
                    <img class="rune" src="./assets/phone-rune.svg" />
                    <div class="player-bar bar health">
                        <div class="bar-diff"></div>
                        <div class="bar-fill"></div>
                    </div>
                    <div class="player-bar bar stamina">
                        <div class="bar-diff"></div>
                        <div class="bar-fill"></div>
                    </div>
                    <div class="boss-info">
                        <div class="boss-name">Skipgard, Keeper of Discontinuity</div>
                        <div class="damage"></div>
                        <div class="enemy-bar bar health">
                            <div class="bar-diff"></div>
                            <div class="bar-fill"></div>
                        </div>
                        <div class="enemy-bar bar stamina hidden">
                            <div class="bar-diff"></div>
                            <div class="bar-fill"></div>
                        </div>
                    </div>
                    <div class="equipped">
                        <div class="slot equip-left" draggable="false" data-slot="left"></div>
                        <div class="slot equip-right" draggable="false" data-slot="right"></div>
                        <div class="slot equip-top" draggable="false" data-slot="top"></div>
                        <div class="slot equip-bottom" draggable="false" data-slot="bottom"></div>
                    </div>
                </div>
                <div class="subs"></div>
                <div class="defeat-screen hidden">You Died</div>
                <div class="victory-screen hidden" title="Great Enemy Felled"></div>
            </div>
        </div>
    </body>
</html>
