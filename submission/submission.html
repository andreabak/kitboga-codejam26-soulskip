<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>SoulSkip</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />


        <style>
            html,
            body {
                background: transparent;
                margin: 0;
                padding: 0;
                font-family: sans-serif;
            }

            #overlay-container {
                width: 960px;
                height: 540px;
            }

            .hidden {
                display: none;
            }

            .game {
                width: 100%;
                height: 100%;
                position: relative;
                overflow: hidden;
            }
            .hide-mouse {
                cursor: none;
            }

            .skip-btn {
                position: absolute;
                bottom: 60px;
                right: 0;
                padding: 10px 18px;
                background: rgba(0, 0, 0, 0.6);
                border: 1px solid black;
                border-right-width: 0;
                font-size: 1.2rem;
                border-radius: 4px 0 0 4px;
                color: white;
                cursor: pointer;
            }

            .player-pointer {
                --accent-color: white;
                position: absolute;
                border: 2px solid var(--accent-color);
                border-radius: 50%;
                width: 32px;
                height: 32px;
                box-shadow: 0 0 12px inset color-mix(in srgb, var(--accent-color), transparent);
                pointer-events: none;
            }
            .player-pointer.low-stamina {
                --accent-color: yellow;
            }

            .hud {
                position: absolute;
                width: 100%;
                height: 100%;
            }
            .bar {
                --bar-fill: 0;
                --bar-color: white;
                --bar-diff: 0;
                --bar-diff-color: darkgoldenrod;
                border: 1px solid white;
                border-top: none;
                background-color: hsla(0, 0%, 0%, 0.25);
                position: absolute;
                height: 8px;
                width: 64px;
            }
            .bar-fill {
                position: absolute;
                left: 0;
                width: calc(100% * var(--bar-fill));
                height: 100%;
                background: var(--bar-color);
            }
            .bar-diff {
                position: absolute;
                left: calc(100% * var(--bar-fill));
                width: calc(100% * (var(--bar-diff)));
                height: 100%;
                background: var(--bar-diff-color);
            }
            .bar.stamina {
                --bar-color: green;
                left: 16px;
                top: 32px;
                width: 192px;
            }
        </style>
      <script type="module" crossorigin src="./submission.js"></script>
    </head>

    <body>
        <div id="overlay-container">
            <div id="game-root" class="game hidden hide-mouse">
                <div class="skip-btn">Skip Ad...</div>
                <div class="player-pointer"></div>
                <div class="hud hidden">
                    <div class="bar stamina">
                        <div class="bar-fill"></div>
                        <div class="bar-diff"></div>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
