<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>SoulSkip</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />


        <style>
            html,
            body {
                background: transparent;
                margin: 0;
                padding: 0;
                font-family: sans-serif;
            }

            #overlay-container {
                width: 960px;
                height: 540px;
            }
        </style>
      <script type="module" crossorigin src="./submission.js"></script>
      <link rel="stylesheet" crossorigin href="./assets/submission.css">
    </head>

    <body>
        <div id="overlay-container">
            <div id="game-root" class="game hidden">
                <div class="enemy">
                    <div class="attack-indicator"></div>
                    <div class="skip-btn">
                        Skip Ad...
                        <div class="vines"></div>
                    </div>
                </div>
                <div class="player hidden">
                    <div class="attack-indicator"></div>
                    <img class="pointer" src="./assets/mouse-pointer.svg" />
                    <div class="defend-animation"></div>
                </div>
                <div class="hud hidden">
                    <div class="player-bar bar health">
                        <div class="bar-diff"></div>
                        <div class="bar-fill"></div>
                    </div>
                    <div class="player-bar bar stamina">
                        <div class="bar-diff"></div>
                        <div class="bar-fill"></div>
                    </div>
                    <div class="boss-info">
                        <div class="boss-name">Skipgard, Keeper of Discontinuity</div>
                        <div class="damage"></div>
                        <div class="enemy-bar bar health">
                            <div class="bar-diff"></div>
                            <div class="bar-fill"></div>
                        </div>
                        <div class="enemy-bar bar stamina hidden">
                            <div class="bar-diff"></div>
                            <div class="bar-fill"></div>
                        </div>
                    </div>
                    <div class="equipped">
                        <div class="slot equip-left" data-slot="left"></div>
                        <div class="slot equip-right" data-slot="right"></div>
                        <div class="slot equip-top" data-slot="top"></div>
                        <div class="slot equip-bottom" data-slot="bottom"></div>
                    </div>
                </div>
                <div class="subs"></div>
                <div class="defeat-screen hidden">You Died</div>
                <div class="victory-screen hidden" title="Great Enemy Felled"></div>
            </div>
        </div>
    </body>
</html>
